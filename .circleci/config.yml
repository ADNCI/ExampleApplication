version: 2.1

jobs:
  run_checks:
    docker:
      - image: cimg/node:18.19
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Audit packages (non-blocking)
          command: npm audit --audit-level=critical || true

      - run:
          name: Run tests
          command: npm test


  build_and_push_docker:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker

      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: Build Docker image
          command: |
            docker build -t "$DOCKER_USERNAME/exampleapp" .

      - run:
          name: Push Docker image
          command: |
            docker push "$DOCKER_USERNAME/exampleapp"


  zap_scan:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker

      - run:
          name: Start application container
          command: |
            docker run -d --name integration_app -p 8080:8080 "$DOCKER_USERNAME/exampleapp"

      - run:
          name: Wait for app to be ready
          command: |
            for i in {1..20}; do
              if curl -s http://localhost:8080 > /dev/null; then
                echo "App is up"
                break
              fi
              echo "Waiting for app..."
              sleep 3
            done

      - run:
          name: Run OWASP ZAP Baseline Scan (non-blocking)
          command: |
            docker run --network container:integration_app \
              owasp/zap2docker-stable zap-baseline.py \
              -t http://localhost:8080 || true


  deploy:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout

      - add_ssh_keys:
          fingerprints:
            - "SHA256:gLU0U5XVoxUOCCEIp8UNV90vweATx/PcNcUEijfP+n4"

      - run:
          name: Fix SSH permissions
          command: |
            chmod 600 ~/.ssh/id_rsa

      - run:
          name: Add EC2 host to known_hosts
          command: |
            ssh-keyscan -H "$EC2_PUBLIC_IP" >> ~/.ssh/known_hosts

      - run:
          name: Deploy to EC2
          command: |
            ssh ubuntu@"$EC2_PUBLIC_IP" \
              'cd /home/ubuntu && ./deploy.sh'

